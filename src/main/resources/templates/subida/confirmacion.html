<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosmar — Foto subida</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1F3864; color: white;
            padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 18px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { padding: 32px; max-width: 600px; margin: 0 auto; }
        h2 { color: #1F3864; margin-bottom: 20px; }
        .card {
            background: white; border-radius: 8px;
            padding: 28px; box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: center;
        }
        .success-icon { font-size: 48px; margin-bottom: 16px; }
        .alert-success {
            background: #d9ead3; color: #1E6B3C;
            padding: 12px 16px; border-radius: 6px;
            font-size: 14px; margin-bottom: 24px;
        }
        .imagen-subida {
            max-width: 100%; max-height: 300px;
            border-radius: 8px; border: 1px solid #ddd;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block; padding: 12px 24px;
            border: none; border-radius: 6px;
            font-size: 14px; cursor: pointer;
            text-decoration: none; margin: 6px;
        }
        .btn-primary { background: #1F3864; color: white; }
        .btn-primary:hover { background: #2E75B6; }
        .btn-secondary { background: #eee; color: #333; }
        .btn-secondary:hover { background: #ddd; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>Rosmar — Consultoría de Sanidad</h1>
    <a th:href="@{/dashboard}">← Volver al inicio</a>
</div>
<div class="container">
    <h2>Foto registrada</h2>
    <div class="card">
        <div class="success-icon">✅</div>
        <div class="alert-success" th:text="${mensaje}"></div>

        <img th:src="@{/uploads/{nombre}(nombre=${imagenPath})}"
             class="imagen-subida" alt="Formato subido">

        <br>
        <a th:href="@{/subida}" class="btn btn-primary">Subir otro formato</a>
        <a th:href="@{/dashboard}" class="btn btn-secondary">Ir al inicio</a>
    </div>
</div>
</body>
</html>
